<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palate Cleansing in Practice — Survey</title>
  <meta name="description" content="A survey on current palate cleansing practices in sensory evaluation" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #FAFAF8;
      --card: #FFFFFF;
      --border: #E2E0DC;
      --border-focus: #8B7E6A;
      --text: #2C2926;
      --text-secondary: #6B6560;
      --text-muted: #9B9590;
      --accent: #5B7F6E;
      --accent-hover: #4A6D5C;
      --accent-light: #EDF3F0;
      --progress-track: #EDEBE8;
      --error: #C4553A;
      --shadow: 0 1px 3px rgba(44, 41, 38, 0.06), 0 1px 2px rgba(44, 41, 38, 0.04);
      --shadow-lg: 0 4px 12px rgba(44, 41, 38, 0.08), 0 2px 4px rgba(44, 41, 38, 0.04);
      --font-heading: 'Source Serif 4', Georgia, serif;
      --font-body: 'DM Sans', 'Helvetica Neue', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    /* ─── Cover ─── */
    .cover {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 16px;
    }

    .cover-images {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 32px;
      margin-bottom: 40px;
    }

    .cover-images img {
      object-fit: contain;
    }

    .cover h1 {
      font-family: var(--font-heading);
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .cover .divider {
      width: 48px;
      height: 2px;
      background: var(--accent);
      margin: 20px auto;
      border-radius: 1px;
    }

    .cover .subtitle {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .cover .meta {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 40px;
    }

    .cover .copyright {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 48px;
      opacity: 0.7;
    }

    /* ─── Buttons ─── */
    .btn-primary {
      padding: 14px 48px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.02em;
      box-shadow: var(--shadow);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: var(--shadow-lg);
      transform: translateY(-1px);
    }

    .btn-back {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-back:disabled {
      border-color: var(--progress-track);
      color: var(--progress-track);
      cursor: not-allowed;
    }

    .btn-next {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
      letter-spacing: 0.01em;
    }

    .btn-next:hover {
      background: var(--accent-hover);
    }

    .btn-submit {
      width: 100%;
      margin-top: 24px;
      padding: 14px 24px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn-submit:hover {
      background: var(--accent-hover);
    }

    .btn-submit:disabled {
      background: var(--text-secondary);
      cursor: not-allowed;
    }

    /* ─── Card ─── */
    .card {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      padding: 32px 28px;
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-header h1 {
      font-family: var(--font-heading);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .card-header p {
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* ─── Progress ─── */
    .progress-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .progress-track {
      height: 4px;
      border-radius: 2px;
      background: var(--progress-track);
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--accent);
      transition: width 0.4s ease;
    }

    /* ─── Question ─── */
    .question-title {
      font-family: var(--font-heading);
      font-size: 20px;
      font-weight: 600;
      line-height: 1.35;
      margin: 24px 0 20px 0;
    }

    .question-hint {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    /* ─── Options ─── */
    .option-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option-label {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: #fff;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 15px;
      line-height: 1.4;
    }

    .option-label.selected {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .option-label input {
      display: none;
    }

    .checkbox-box,
    .radio-box {
      width: 20px;
      height: 20px;
      min-width: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .checkbox-box {
      border-radius: 4px;
      border: 2px solid var(--border);
      background: #fff;
    }

    .checkbox-box.checked {
      border-color: var(--accent);
      background: var(--accent);
    }

    .radio-box {
      border-radius: 50%;
      border: 2px solid var(--border);
      background: #fff;
    }

    .radio-box.checked {
      border-color: var(--accent);
    }

    .radio-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* ─── Other field ─── */
    .other-field {
      margin-top: 12px;
    }

    .other-field label {
      font-size: 14px;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 6px;
    }

    .other-field input,
    .open-textarea {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .other-field input:focus,
    .open-textarea:focus {
      border-color: var(--border-focus);
    }

    .open-textarea {
      resize: vertical;
      line-height: 1.5;
      padding: 12px 14px;
    }

    /* ─── Navigation ─── */
    .nav-row {
      display: flex;
      justify-content: space-between;
      margin-top: 28px;
      gap: 12px;
    }

    /* ─── Error ─── */
    .error-msg {
      font-size: 14px;
      color: var(--error);
      margin-top: 12px;
    }

    /* ─── Review ─── */
    .review-title {
      font-family: var(--font-heading);
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .review-hint {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .review-item {
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-bottom: 12px;
    }

    .review-item:hover {
      border-color: var(--border-focus);
      box-shadow: var(--shadow);
    }

    .review-item .q-num {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .review-item .q-text {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .review-item .q-answer {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    /* ─── Thank you ─── */
    .thankyou {
      text-align: center;
      padding: 48px 16px;
    }

    .thankyou .check {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .thankyou h2 {
      font-family: var(--font-heading);
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .thankyou p {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 420px;
      margin: 0 auto;
    }

    .footer {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 24px;
      opacity: 0.6;
      text-align: center;
    }

    /* ─── Fade ─── */
    .fade-in {
      animation: fadeIn 0.25s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      .cover h1 {
        font-size: 28px;
      }

      .cover-images {
        gap: 20px;
      }

      .cover-images img:first-child {
        width: 130px !important;
      }

      .cover-images img:last-child {
        width: 130px !important;
      }

      .card {
        padding: 24px 20px;
      }
    }
  </style>
</head>

    // ══════════════════════════════════════════════════════════════════
    // QUESTIONS
    // ══════════════════════════════════════════════════════════════════
    const questions = [
      {
        id: "q1", number: 1, text: "What type of sensory work do you primarily conduct?", type: "multi",
        options: ["Trained panel", "Consumer testing", "Product development / R&D", "Academic research", "Quality / manufacturing"], hasOther: true
      },
      {
        id: "q2", number: 2, text: "What product categories do you most often evaluate?", type: "multi",
        options: ["Sweet", "Savory", "Beverages", "Dairy", "Fat-rich / oily", "Astringent (e.g., wine, tea)", "Spicy / trigeminal", "Non-food (fragrance, personal care, etc.)"], hasOther: true
      },
      {
        id: "q3", number: 3, text: "Between samples, what do you typically use?", type: "multi",
        options: ["Water", "Solid cleanser (cracker, bread, rice, etc.)", "Other food-based cleanser (e.g., apple, yogurt, sorbet)", "Functional solution (e.g., pectin, PEG, etc.)", "Time only (no cleanser)", "Nothing (no cleansing or time control)", "It depends on the product"], hasOther: true
      },
      {
        id: "q4", number: 4, text: "How often do you rely on time alone (no cleanser)?", type: "single",
        options: ["Always", "Often", "Sometimes", "Rarely", "Never"], hasOther: false
      },
      {
        id: "q5", number: 5, text: "How confident are you that your approach effectively resets perception between samples?", type: "single",
        options: ["Very confident", "Somewhat confident", "Neutral / unsure", "Not very confident", "Not at all confident"], hasOther: false
      },
      {
        id: "q6", number: 6, text: "What does \u201cgood enough\u201d palate cleansing mean in your work?", type: "multi",
        options: ["No noticeable carryover", "No impact on key attributes", "Stable results across samples/order", "Panelists report feeling reset", "Results are actionable for decisions", "We follow standard protocol", "We accept some level of carryover"], hasOther: true
      },
      {
        id: "q7", number: 7, text: "How do you determine whether your approach is working?", type: "multi",
        options: ["Panelist feedback", "Personal judgment / experience", "Reviewing data for order effects", "Replicates / consistency checks", "Pilot testing", "Formal statistical testing", "We do not explicitly check"], hasOther: true
      },
      {
        id: "q8", number: 8, text: "Have you ever tested or compared different palate cleansing approaches?", type: "single",
        options: ["Yes, formally", "Yes, informally", "No"], hasOther: false
      },
      {
        id: "q9", number: 9, text: "What limits your ability to use or validate palate cleansers?", type: "multi",
        options: ["Time constraints", "Budget / cost", "Study complexity", "Panel fatigue", "Product compatibility", "Lack of clear guidance", "Not seen as necessary", "Operational/logistical challenges"], hasOther: true
      },
      {
        id: "q10", number: 10, text: "In your current work, what is the biggest trade-off you make?", type: "single",
        options: ["Speed vs rigor", "Realism vs control", "Simplicity vs accuracy", "Cost vs methodological precision"], hasOther: true
      },
      {
        id: "q11", number: 11, text: "In one sentence: What would help you feel more confident in your sensory results?", type: "open",
        options: [], hasOther: false
      },
    ];

    // ══════════════════════════════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════════════════════════════
    const state = {
      started: false,
      page: 0,          // 0..10 = questions, 11 = review, 12 = done
      answers: {},       // { q1: [...], q4: "Always", q11: "text" }
      otherTexts: {},    // { q1: "my other text", ... }
      error: "",
      submitting: false,
    };
    const total = questions.length;

    function generateId() {
      return "r_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    // ══════════════════════════════════════════════════════════════════
    // RENDER
    // ══════════════════════════════════════════════════════════════════
    function render() {
      const app = document.getElementById("app");
      if (!state.started) {
        app.innerHTML = renderCover();
      } else if (state.page === total + 1) {
        app.innerHTML = renderThankYou();
      } else if (state.page === total) {
        app.innerHTML = renderReview();
      } else {
        app.innerHTML = renderQuestion(state.page);
      }
      bindEvents();
    }

    function renderCover() {
      return `
        <div class="cover">
          <div style="max-width:580px;width:100%">
            <div class="cover-images">
              <img src="${CRACKER_IMG}" alt="Saltine crackers" style="width:160px;height:auto;opacity:0.9" />
              <img src="${WATER_IMG}" alt="Glass of water" style="width:160px;height:auto;opacity:0.85" />
            </div>
            <h1>Palate Cleansing in Practice</h1>
            <div class="divider"></div>
            <p class="subtitle">A survey on current practices in sensory evaluation</p>
            <p class="meta">11 questions &middot; takes about 3 minutes</p>
            <button class="btn-primary" data-action="start">Begin Survey</button>
            <p class="copyright">&copy; ${new Date().getFullYear()} Amai Consulting LLC</p>
          </div>
        </div>`;
    }

    function renderQuestion(idx) {
      const q = questions[idx];
      const pct = ((idx + 1) / total * 100).toFixed(0);
      let optionsHtml = "";

      if (q.type === "multi") {
        const selected = state.answers[q.id] || [];
        optionsHtml = `<p class="question-hint">Select all that apply</p><div class="option-list">`;
        q.options.forEach(opt => {
          const checked = selected.includes(opt);
          optionsHtml += `
            <label class="option-label ${checked ? 'selected' : ''}" data-action="toggle-multi" data-value="${esc(opt)}">
              <input type="checkbox" ${checked ? 'checked' : ''} />
              <span class="checkbox-box ${checked ? 'checked' : ''}">${checked ? '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}</span>
              ${esc(opt)}
            </label>`;
        });
        optionsHtml += `</div>`;
      } else if (q.type === "single") {
        const selected = state.answers[q.id] || "";
        optionsHtml = `<p class="question-hint">Select one</p><div class="option-list">`;
        q.options.forEach(opt => {
          const checked = selected === opt;
          optionsHtml += `
            <label class="option-label ${checked ? 'selected' : ''}" data-action="select-single" data-value="${esc(opt)}">
              <input type="radio" name="${q.id}" ${checked ? 'checked' : ''} />
              <span class="radio-box ${checked ? 'checked' : ''}">${checked ? '<span class="radio-dot"></span>' : ''}</span>
              ${esc(opt)}
            </label>`;
        });
        optionsHtml += `</div>`;
      } else {
        optionsHtml = `<textarea class="open-textarea" rows="4" placeholder="Type your response here..." data-input="open">${esc(state.answers[q.id] || "")}</textarea>`;
      }

      // Other field (always visible)
      let otherHtml = "";
      if (q.hasOther) {
        otherHtml = `
          <div class="other-field">
            <label>Other (please specify):</label>
            <input type="text" value="${esc(state.otherTexts[q.id] || "")}" placeholder="Type here..." data-input="other" />
          </div>`;
      }

      return `
        <div class="container">
          <div class="card-header">
            <h1>Palate Cleansing in Practice</h1>
            <p>A survey on current practices in sensory evaluation</p>
          </div>
          <div class="card">
            <div>
              <div class="progress-info"><span>Question ${idx + 1} of ${total}</span><span>${pct}%</span></div>
              <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
            </div>
            <div class="fade-in">
              <h2 class="question-title">${esc(q.text)}</h2>
              ${optionsHtml}
              ${otherHtml}
              ${state.error ? `<p class="error-msg">${state.error}</p>` : ''}
              <div class="nav-row">
                <button class="btn-back" data-action="prev" ${idx === 0 ? 'disabled' : ''}>&larr; Back</button>
                <button class="btn-next" data-action="next">${idx === total - 1 ? 'Review &rarr;' : 'Next &rarr;'}</button>
              </div>
            </div>
          </div>
          <p class="footer">&copy; ${new Date().getFullYear()} Amai Consulting LLC</p>
        </div>`;
    }

    function renderReview() {
      let items = "";
      questions.forEach((q, i) => {
        const val = state.answers[q.id];
        const other = state.otherTexts[q.id];
        let display = "";
        if (q.type === "multi") {
          const parts = val && val.length ? [...val] : [];
          if (other) parts.push("Other: " + other);
          display = parts.length ? parts.join(", ") : "\u2014 not answered \u2014";
        } else if (q.type === "single") {
          display = val || "\u2014 not answered \u2014";
          if (val === "Other" && other) display = "Other: " + other;
          else if (other && val !== "Other") display += " (Other: " + other + ")";
        } else {
          display = val || "\u2014 not answered \u2014";
        }
        items += `
          <div class="review-item" data-action="edit" data-index="${i}">
            <div class="q-num">Q${q.number}</div>
            <div class="q-text">${esc(q.text)}</div>
            <div class="q-answer">${esc(display)}</div>
          </div>`;
      });

      return `
        <div class="container">
          <div class="card-header">
            <h1>Palate Cleansing in Practice</h1>
            <p>A survey on current practices in sensory evaluation</p>
          </div>
          <div class="card">
            <div class="fade-in">
              <h2 class="review-title">Review Your Responses</h2>
              <p class="review-hint">Please review before submitting. Click any question to edit.</p>
              ${items}
              <button class="btn-submit" data-action="submit" ${state.submitting ? 'disabled' : ''}>
                ${state.submitting ? 'Submitting...' : 'Submit Survey'}
              </button>
            </div>
          </div>
          <p class="footer">&copy; ${new Date().getFullYear()} Amai Consulting LLC</p>
        </div>`;
    }

    function renderThankYou() {
      return `
        <div class="container">
          <div class="card-header">
            <h1>Palate Cleansing in Practice</h1>
          </div>
          <div class="card">
            <div class="thankyou fade-in">
              <div class="check">&#10003;</div>
              <h2>Thank you!</h2>
              <p>Your responses have been recorded. We appreciate your time and insights on palate cleansing practices.</p>
            </div>
          </div>
          <p class="footer">&copy; ${new Date().getFullYear()} Amai Consulting LLC</p>
        </div>`;
    }

    // ══════════════════════════════════════════════════════════════════
    // EVENT BINDING
    // ══════════════════════════════════════════════════════════════════
    function bindEvents() {
      document.querySelectorAll("[data-action]").forEach(el => {
        el.addEventListener("click", handleAction);
      });
      const otherInput = document.querySelector("[data-input='other']");
      if (otherInput) {
        otherInput.addEventListener("input", e => {
          const q = questions[state.page];
          state.otherTexts[q.id] = e.target.value;
          state.error = "";
          // For single-select, typing in Other auto-selects "Other"
          if (q.type === "single" && e.target.value) {
            state.answers[q.id] = "Other";
          }
        });
      }
      const openInput = document.querySelector("[data-input='open']");
      if (openInput) {
        openInput.addEventListener("input", e => {
          const q = questions[state.page];
          state.answers[q.id] = e.target.value;
          state.error = "";
        });
      }
    }

    function handleAction(e) {
      e.preventDefault();
      const el = e.currentTarget;
      const action = el.dataset.action;

      if (action === "start") {
        state.started = true;
        render();
      } else if (action === "toggle-multi") {
        const q = questions[state.page];
        const val = el.dataset.value;
        const arr = state.answers[q.id] || [];
        if (arr.includes(val)) {
          state.answers[q.id] = arr.filter(v => v !== val);
        } else {
          state.answers[q.id] = [...arr, val];
        }
        state.error = "";
        render();
      } else if (action === "select-single") {
        const q = questions[state.page];
        state.answers[q.id] = el.dataset.value;
        state.error = "";
        render();
      } else if (action === "next") {
        if (!validate()) {
          state.error = "Please provide a response before continuing.";
          render();
          return;
        }
        state.error = "";
        state.page++;
        render();
        window.scrollTo(0, 0);
      } else if (action === "prev") {
        state.error = "";
        state.page = Math.max(0, state.page - 1);
        render();
        window.scrollTo(0, 0);
      } else if (action === "edit") {
        state.page = parseInt(el.dataset.index);
        render();
        window.scrollTo(0, 0);
      } else if (action === "submit") {
        submitSurvey();
      }
    }

    function validate() {
      const q = questions[state.page];
      const val = state.answers[q.id];
      const other = state.otherTexts[q.id];
      if (q.type === "multi") return (val && val.length > 0) || !!other;
      if (q.type === "single") return !!val || !!other;
      if (q.type === "open") return val && val.trim().length > 0;
      return true;
    }

    async function submitSurvey() {
      state.submitting = true;
      render();

      const payload = {
        responseId: generateId(),
        timestamp: new Date().toISOString(),
      };
      questions.forEach(q => {
        const val = state.answers[q.id];
        const other = state.otherTexts[q.id];
        if (q.type === "multi") {
          payload[q.id] = val ? val.join("; ") : "";
          if (q.hasOther) payload[q.id + "_other"] = other || "";
        } else if (q.type === "single") {
          payload[q.id] = val || "";
          if (q.hasOther) payload[q.id + "_other"] = other || "";
        } else {
          payload[q.id] = val || "";
        }
      });

      try {
        if (GOOGLE_SCRIPT_URL !== "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
          // Use form POST via hidden form to avoid CORS issues with Apps Script
          await new Promise((resolve, reject) => {
            const form = document.createElement("form");
            form.method = "POST";
            form.action = GOOGLE_SCRIPT_URL;
            form.target = "_blank_submit_frame";
            form.style.display = "none";

            // Create a hidden iframe to receive the response
            let iframe = document.getElementById("_blank_submit_frame");
            if (!iframe) {
              iframe = document.createElement("iframe");
              iframe.name = "_blank_submit_frame";
              iframe.id = "_blank_submit_frame";
              iframe.style.display = "none";
              document.body.appendChild(iframe);
            }

            // Add payload fields as hidden inputs
            Object.keys(payload).forEach(key => {
              const input = document.createElement("input");
              input.type = "hidden";
              input.name = key;
              input.value = payload[key];
              form.appendChild(input);
            });

            document.body.appendChild(form);
            form.submit();

            // Give it time to submit, then resolve
            setTimeout(() => {
              form.remove();
              resolve();
            }, 2000);
          });
        } else {
          console.log("Survey payload (no backend configured):", payload);
        }
        state.page = total + 1;
      } catch (err) {
        console.error("Submit error:", err);
        alert("There was an error submitting. Please try again.");
      } finally {
        state.submitting = false;
        render();
      }
    }

    function esc(str) {
      if (!str) return "";
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    // ══════════════════════════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════════════════════════
    render();
  </script>
</body>

</html>
